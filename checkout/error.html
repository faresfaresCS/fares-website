<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>התשלום לא הושלם | פארס פארס</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .checkout-result {
        max-width: 480px;
        margin: 4rem auto;
        padding: 2rem;
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        text-align: center;
      }
      .checkout-result h1 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <main class="checkout-result">
      <h1>התשלום לא הושלם</h1>
      <p id="message">התשלום בוטל או נכשל. אפשר לנסות שוב או לשלוח הזמנה בוואטסאפ.</p>
      <a class="btn btn-primary" href="/" style="display: inline-flex; width: auto; margin-top: 1rem">חזרה לחנות</a>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      if (params.get("reason") === "mac") {
        document.getElementById("message").textContent =
          "אימות התשלום נכשל. אנא צרו קשר בוואטסאפ עם פרטי ההזמנה.";
      }
    </script>
  </body>
</html>
